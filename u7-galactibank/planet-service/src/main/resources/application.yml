quarkus:
  mongodb:
    connection-string: mongodb://localhost:27017/?retryWrites=false&uuidRepresentation=standard
    database: galactibank
  http:
    port: 8082
  log:
    level: INFO
  swagger-ui:
    always-include: true
    path: /swagger-ui
  kafka:
    devservices:
      enabled: false
    bootstrap-servers: localhost:9092